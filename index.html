<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>龙湖 OEM 品控云台</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --primary-dark: #003894;
      --primary-light: #00B0AF;
      --primary-gradient: linear-gradient(135deg, #003894 0%, #00B0AF 100%);
      --bg: #f4f6f9;
      --card-bg: #ffffff;
      --text: #1f2937;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.1);
      --radius: 12px;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    .hidden { display: none !important; }

    /* Header */
    .header { background: var(--primary-gradient); color: #fff; padding: 16px 24px; box-shadow: 0 2px 10px rgba(0, 56, 148, 0.25); position: sticky; top: 0; z-index: 100; overflow: hidden; }
    .header-bg-mascot { position: absolute; right: 160px; top: 50%; transform: translateY(-50%); height: 110px; width: auto; opacity: 0.18; pointer-events: none; z-index: 0; }
    .header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; position: relative; z-index: 1; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo { height: 64px; width: auto; background-color: #fff; padding: 8px 12px; border-radius: 10px; object-fit: contain; flex-shrink: 0; }
    .brand { display: flex; flex-direction: column; }
    .brand-title { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .brand-subtitle { font-size: 13px; opacity: 0.9; font-weight: 400; }
    .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; }
    .user-role { background: rgba(255, 255, 255, 0.2); padding: 4px 10px; border-radius: 999px; font-weight: 600; }
    .btn-logout { background: rgba(255, 255, 255, 0.15); color: #fff; border: 1px solid rgba(255, 255, 255, 0.3); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-logout:hover { background: rgba(255, 255, 255, 0.25); }
    .notification-badge { display: flex; align-items: center; }
    .notification-badge button { background: var(--warning); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600; }
    .badge-count { background: #fff; color: var(--warning); padding: 1px 6px; border-radius: 10px; font-size: 11px; margin-left: 4px; }

    /* Login */
    .login-screen { position: fixed; inset: 0; background: radial-gradient(circle at 10% 20%, rgba(0, 176, 175, 0.08) 0%, transparent 25%), radial-gradient(circle at 90% 80%, rgba(0, 56, 148, 0.08) 0%, transparent 25%), var(--bg); display: flex; align-items: center; justify-content: center; z-index: 400; padding: 20px; }
    .login-card { background: var(--card-bg); border-radius: var(--radius); padding: 36px; width: min(100%, 400px); box-shadow: var(--shadow-hover); text-align: center; }
    .login-logo { height: 96px; margin-bottom: 20px; background-color: #fff; padding: 12px 24px; border-radius: 14px; box-shadow: var(--shadow); object-fit: contain; }
    .login-mascot { position: absolute; bottom: 24px; right: 24px; width: 120px; height: auto; opacity: 0.85; pointer-events: none; }
    .login-mascot-left { position: absolute; bottom: 24px; left: 24px; width: 100px; height: auto; opacity: 0.7; pointer-events: none; }
    .login-title { font-size: 22px; font-weight: 700; color: var(--primary-dark); margin-bottom: 6px; }
    .login-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
    .login-form { display: flex; flex-direction: column; gap: 16px; text-align: left; }
    .login-error { color: var(--error); font-size: 13px; min-height: 20px; text-align: center; }

    /* Container */
    .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .section { margin-bottom: 28px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .section-title { font-size: 18px; font-weight: 700; color: var(--primary-dark); display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ""; width: 4px; height: 20px; background: var(--primary-gradient); border-radius: 2px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .stat-card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); transition: transform 0.2s; position: relative; overflow: hidden; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .stat-card.clickable { cursor: pointer; }
    .stat-card.clickable.active { box-shadow: 0 0 0 3px var(--warning), var(--shadow-hover); }
    .stat-card::after { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary-gradient); }
    .stat-label { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 800; color: var(--primary-dark); }

    /* Toolbar */
    .toolbar { background: var(--card-bg); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .toolbar-group { display: flex; align-items: center; gap: 8px; flex: 1 1 auto; }
    .search-input, .filter-select { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; min-width: 140px; }
    .search-input { min-width: 220px; flex: 1 1 auto; }
    .search-input:focus, .filter-select:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(0, 176, 175, 0.15); }

    /* Card */
    .card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }

    /* Form */
    .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full-width { grid-column: 1 / -1; }
    .form-label { font-size: 14px; font-weight: 600; color: var(--text); }
    .required::after { content: " *"; color: var(--error); }
    .form-control, .form-select, .form-textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; background: #fff; color: var(--text); }
    .form-control:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(0, 176, 175, 0.15); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .btn { padding: 11px 24px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-primary { background: var(--primary-gradient); color: #fff; }
    .btn-primary:hover { opacity: 0.92; box-shadow: 0 4px 12px rgba(0, 56, 148, 0.3); }
    .btn-secondary { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #f9fafb; border-color: #d1d5db; }
    .btn-danger { background: #fff; color: var(--error); border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-warning { background: #fff; color: #92400e; border: 1px solid #fde68a; }
    .btn-warning:hover { background: #fffbeb; }
    .btn-success { background: #fff; color: #065f46; border: 1px solid #a7f3d0; }
    .btn-success:hover { background: #f0fdf4; }
    .btn-purple { background: #fff; color: #5b21b6; border: 1px solid #ddd6fe; }
    .btn-purple:hover { background: #f5f3ff; }
    .btn-sm { padding: 6px 10px; font-size: 13px; }

    /* Order Card */
    .orders-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .order-card { background: var(--card-bg); border-radius: var(--radius); padding: 0; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; border-left: 5px solid var(--primary-light); }
    .order-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .order-card.status-completed { border-left-color: var(--success); }
    .order-card.status-rejected { border-left-color: var(--error); }
    .order-card-body { padding: 18px; }
    .order-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .order-no { font-size: 14px; color: var(--primary-dark); font-weight: 700; font-family: 'Consolas', monospace; }
    .order-project-type { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .project-type-domestic { background: #dbeafe; color: #1e40af; }
    .project-type-overseas { background: #fce7f3; color: #9d174d; }
    .order-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .order-meta { font-size: 13px; color: var(--text-secondary); display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .stage-progress { display: flex; align-items: center; gap: 4px; padding: 8px 0; flex-wrap: wrap; }
    .stage-dot { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; background: #f3f4f6; color: #6b7280; }
    .stage-dot.completed { background: #d1fae5; color: #065f46; }
    .stage-dot.current { background: #dbeafe; color: #1e40af; box-shadow: 0 0 0 2px rgba(0, 56, 148, 0.3); }
    .stage-arrow { color: #d1d5db; font-size: 10px; }
    .order-actions { display: flex; gap: 6px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid var(--border); margin-top: 10px; }
    .order-status-tag { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .status-in-progress { background: #fef3c7; color: #92400e; }
    .status-completed-tag { background: #d1fae5; color: #065f46; }
    .status-rejected-tag { background: #fee2e2; color: #991b1b; }

    /* Stage display */
    .stages-display { padding: 0 18px 18px; border-top: 1px dashed var(--border); margin-top: 10px; }
    .stage-row { padding: 10px 0; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .stage-row:last-child { border-bottom: none; }
    .stage-name { font-weight: 600; font-size: 14px; min-width: 100px; }
    .stage-status { font-size: 12px; padding: 2px 8px; border-radius: 999px; }
    .stage-attachments { font-size: 12px; color: var(--text-secondary); }

    /* File upload */
    .file-upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa; }
    .file-upload-area:hover, .file-upload-area.dragover { border-color: var(--primary-light); background: #f0f9fa; }
    .file-upload-area input { display: none; }
    .file-upload-text { color: var(--text-secondary); font-size: 14px; }
    .file-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .file-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #f9fafb; border-radius: 6px; font-size: 13px; }
    .file-item img { width: 32px; height: 32px; object-fit: cover; border-radius: 4px; }
    .file-item .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .file-size { color: var(--text-secondary); font-size: 12px; }
    .file-item .file-remove { background: none; border: none; color: var(--error); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 6px; }
    .upload-progress { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--primary-light); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 48px 20px; color: var(--text-secondary); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }

    /* Toast */
    .toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { padding: 12px 24px; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15); opacity: 0; transform: translateY(20px); transition: opacity 0.3s, transform 0.3s; pointer-events: auto; min-width: 180px; text-align: center; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--error); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); display: flex; align-items: center; justify-content: center; z-index: 300; opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; padding: 20px; }
    .modal-overlay.show { opacity: 1; visibility: visible; }
    .modal { background: #fff; border-radius: var(--radius); padding: 24px; width: min(100%, 720px); max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-hover); transform: scale(0.96); transition: transform 0.2s; }
    .modal-overlay.show .modal { transform: scale(1); }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    .modal-body { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }

    /* QR Modal */
    .qr-display { display: flex; justify-content: center; padding: 20px; background: #fff; border-radius: 8px; }
    .qr-info { text-align: center; margin-top: 12px; color: var(--text-secondary); font-size: 13px; }

    /* Approval detail */
    .approval-stage-info { background: #f9fafb; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
    .approval-stage-info h4 { color: var(--primary-dark); margin-bottom: 8px; font-size: 14px; }
    .info-row { display: flex; padding: 4px 0; font-size: 14px; }
    .info-label { width: 120px; color: var(--text-secondary); }
    .info-value { flex: 1; color: var(--text); word-break: break-all; }

    .footer-slogan { text-align: center; padding: 24px; color: var(--text-secondary); font-size: 14px; letter-spacing: 3px; }
    .footer-slogan strong { color: var(--primary-dark); font-weight: 700; }

    /* View modal order detail */
    .view-banner { background: var(--primary-gradient); color: #fff; padding: 20px 24px; border-radius: 8px; margin-bottom: 16px; }
    .view-banner-title { font-size: 18px; font-weight: 700; }
    .view-banner-meta { font-size: 13px; opacity: 0.9; margin-top: 4px; }
    .view-banner-tags { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .view-tag { padding: 4px 10px; border-radius: 999px; font-size: 12px; background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.4); }
    .view-section-title { font-size: 14px; font-weight: 700; color: var(--primary-dark); margin: 18px 0 10px; padding-left: 10px; border-left: 4px solid var(--primary-light); }
    .view-section-title:first-child { margin-top: 0; }
    .view-row { display: flex; padding: 8px 0; border-bottom: 1px dashed #e0e7f0; font-size: 14px; }
    .view-row:last-child { border-bottom: none; }
    .view-label { width: 110px; color: var(--primary-dark); font-weight: 600; flex-shrink: 0; }
    .view-value { flex: 1; color: var(--text); word-break: break-all; }
    .view-stage-block { background: #f9fafb; border-radius: 8px; padding: 14px; margin-bottom: 10px; border-left: 4px solid var(--primary-light); }
    .view-stage-block.approved { border-left-color: var(--success); }
    .view-stage-block.rejected { border-left-color: var(--error); }
    .view-stage-block.pending { border-left-color: var(--warning); }
    .view-stage-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .view-stage-name { font-weight: 700; color: var(--primary-dark); }
    .view-stage-status { padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .view-stage-status.approved { background: #d1fae5; color: #065f46; }
    .view-stage-status.rejected { background: #fee2e2; color: #991b1b; }
    .view-stage-status.pending { background: #fef3c7; color: #92400e; }
    .view-stage-status.draft { background: #f3f4f6; color: #6b7280; }
    .view-file-link { display: inline-block; padding: 4px 10px; background: #dbeafe; color: #1e40af; border-radius: 6px; font-size: 12px; text-decoration: none; margin: 2px; }
    .view-file-link:hover { background: #bfdbfe; }
    .view-img-preview { max-width: 160px; max-height: 160px; border-radius: 6px; margin-top: 6px; }
    .view-history-item { padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .view-history-item:last-child { border-bottom: none; }
    .view-history-time { color: var(--text-secondary); font-size: 12px; }

    /* Responsive */
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .orders-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-group { width: 100%; }
    }
    @media (max-width: 768px) {
      .header-inner { gap: 12px; }
      .logo { height: 34px; }
      .brand-title { font-size: 16px; }
      .brand-subtitle { font-size: 11px; }
      .user-info { font-size: 12px; gap: 8px; }
      .user-role { display: none; }
      .container { padding: 16px; }
      .stats-grid, .form-grid, .orders-grid { grid-template-columns: 1fr; }
      .stat-value { font-size: 28px; }
      .form-actions { flex-direction: column; }
      .btn { width: 100%; }
      .toolbar-group { flex-direction: column; align-items: stretch; }
      .search-input, .filter-select { width: 100%; }
      .modal-actions { flex-direction: column; }
      .header-bg-mascot { right: 20px; height: 80px; opacity: 0.12; }
      .login-mascot, .login-mascot-left { display: none; }
    }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div class="login-screen" id="login-screen">
    <img src="页面图片/吉祥物.png" alt="" class="login-mascot-left" />
    <div class="login-card">
      <img src="页面图片/logo1.jpg" alt="LONGFOR 龙湖" class="login-logo" />
      <div class="login-title">OEM 品控云台</div>
      <div class="login-subtitle">实时品控，全程可溯</div>
      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="login-username" class="form-label required">用户名</label>
          <input type="text" id="login-username" class="form-control" placeholder="请输入用户名" required />
        </div>
        <div class="form-group">
          <label for="login-password" class="form-label required">密码</label>
          <input type="password" id="login-password" class="form-control" placeholder="请输入密码" required />
        </div>
        <div class="login-error" id="login-error"></div>
        <button type="submit" class="btn btn-primary">登 录</button>
      </form>
    </div>
    <img src="页面图片/吉祥物.png" alt="" class="login-mascot" />
  </div>

  <!-- Header -->
  <header class="header hidden" id="main-header">
    <img src="页面图片/吉祥物.png" alt="" class="header-bg-mascot" />
    <div class="header-inner">
      <div class="header-left">
        <img src="页面图片/logo1.jpg" alt="LONGFOR 龙湖" class="logo" />
        <div class="brand">
          <span class="brand-title">OEM 品控云台</span>
          <span class="brand-subtitle">实时品控，全程可溯</span>
        </div>
      </div>
      <div class="user-info">
        <span class="user-role" id="user-role">未登录</span>
        <div class="notification-badge hidden" id="pending-badge">
          <button type="button" id="btn-pending-list">待审批 <span class="badge-count" id="pending-count">0</span></button>
        </div>
        <button type="button" class="btn-logout reviewer-only hidden" id="btn-manage-users">👥 账户管理</button>
        <button type="button" class="btn-logout" id="btn-logout">退出登录</button>
      </div>
    </div>
  </header>

  <main class="container hidden" id="main-container">
    <!-- 统计看板 -->
    <section class="section">
      <h2 class="section-title">数据统计看板</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">总单据数</div><div class="stat-value" id="stat-total">0</div></div>
        <div class="stat-card"><div class="stat-label">进行中</div><div class="stat-value" id="stat-progress">0</div></div>
        <div class="stat-card"><div class="stat-label">已完成</div><div class="stat-value" id="stat-completed">0</div></div>
        <div class="stat-card stat-card-pending clickable" id="stat-card-pending"><div class="stat-label">待审批</div><div class="stat-value" id="stat-pending">0</div></div>
      </div>
    </section>

    <!-- 工具栏 -->
    <section class="section">
      <div class="toolbar">
        <div class="toolbar-group">
          <input type="text" id="search-input" class="search-input" placeholder="搜索单据号、工厂、项目、材料" />
          <select id="filter-project-type" class="filter-select">
            <option value="">全部项目类型</option>
            <option value="domestic">国内项目</option>

        return Array.from(new Uint8Array(hashBuf)).map((b) => b.toString(16).padStart(2, "0")).join("");

        return stages[idx + 1];

          const stagesByOrder = {};

            if (!stagesByOrder[s.order_no]) stagesByOrder[s.order_no] = [];
            stagesByOrder[s.order_no].push(s);

          return (ordersRes.data || []).map((o) => ({

          }));

          const { data: urlData } = supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(filePath);
          return { name: file.name, size: file.size, type: file.type, url: urlData.publicUrl };

        container.appendChild(list);

        function renderFileList() {
          list.innerHTML = "";
          files.forEach((f, i) => {
            const item = document.createElement("div");
            item.className = "file-item";
            const isImg = (f.type || "").startsWith("image/") || /\.(jpg|jpeg|png)$/i.test(f.name || "");
            item.innerHTML = (isImg ? '<img src="' + escapeHtml(f.url) + '" />' : '<div style="width:32px;height:32px;background:#e5e7eb;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;">📄</div>') +
              '<a class="file-name" href="' + escapeHtml(f.url) + '" target="_blank">' + escapeHtml(f.name) + '</a>' +
              '<span class="file-size">' + Math.round((f.size || 0) / 1024) + ' KB</span>' +
              (readonly ? '' : '<button type="button" class="file-remove" data-i="' + i + '">×</button>');
            list.appendChild(item);
          });
          if (!readonly) {
            list.querySelectorAll(".file-remove").forEach((btn) => {
              btn.addEventListener("click", () => {
                files.splice(parseInt(btn.dataset.i), 1);
                renderFileList();
              });
            });
          }
        }

        if (!readonly) {
          const area = document.createElement("div");
          area.className = "file-upload-area";
          area.innerHTML = '<div class="file-upload-text">📎 点击或拖拽上传文件（PDF / JPG / PNG / EXCEL）</div><input type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.xls,.xlsx" />';
          const input = area.querySelector("input");
          area.addEventListener("click", (e) => { if (e.target !== input) input.click(); });
          area.addEventListener("dragover", (e) => { e.preventDefault(); area.classList.add("dragover"); });
          area.addEventListener("dragleave", () => area.classList.remove("dragover"));
          area.addEventListener("drop", (e) => { e.preventDefault(); area.classList.remove("dragover"); handleFiles(e.dataTransfer.files); });
          input.addEventListener("change", (e) => { handleFiles(e.target.files); input.value = ""; });
          async function handleFiles(fileList) {
            for (const f of fileList) {
              if (!checkFileType(f)) { showToast("不支持的文件类型：" + f.name, "error"); continue; }
              const placeholder = document.createElement("div");
              placeholder.className = "file-item";
              placeholder.innerHTML = '<span class="upload-progress"></span><span class="file-name">' + escapeHtml(f.name) + '</span><span class="file-size">上传中...</span>';
              list.appendChild(placeholder);
              const result = await uploadFile(f);
              placeholder.remove();
              if (result) {
                files.push(result);
                renderFileList();
              }
            }
          }
          container.appendChild(area);
        }

        renderFileList();
        return files;
      }

      // 收集表单数据
      function collectFormData() {
        const data = {};
        stageFormContent.querySelectorAll("[data-key]").forEach((el) => {
          if (el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.tagName === "SELECT") {
            data[el.dataset.key] = el.value.trim();
          }
        });
        // 收集所有附件
        const allFiles = [];
        const fileLists = stageFormContent.querySelectorAll(".file-list");
        fileLists.forEach((list) => {
          const items = list.querySelectorAll(".file-item a.file-name");
          // 通过 file-uploader 关联取 files 数组
        });
        // 简化：从全局 _stageFiles 读取
        if (window._stageFiles) {
          Object.keys(window._stageFiles).forEach((k) => {
            data[k] = window._stageFiles[k];
          });
        }
        return data;

      function validateFormData(data, stageKey) {
        if (stageKey === "basic") {
          const required = ["factory_name", "project_name", "material_name", "material_params", "surface_effect", "batch", "quantity", "production_start_time"];
          for (const f of required) {
            if (!data[f]) { showToast("请填写所有必填项：" + f, "error"); return false; }
          }
          if (!data.seal_photo || (Array.isArray(data.seal_photo) && data.seal_photo.length === 0)) {
            showToast("请上传封样照片", "error");
            return false;
          }
        } else if (stageKey === "second_check") {
          if (!data.front_result) { showToast("请填写前段检测结果", "error"); return false; }
          if (!data.middle_result) { showToast("请填写中段检测结果", "error"); return false; }
          if (!data.back_result) { showToast("请填写后段检测结果", "error"); return false; }
        } else {
          if (!data.result_description) { showToast("请填写检测结果描述", "error"); return false; }
        }
        return true;
      }

      // ====== 打开阶段表单 ======
      async function openStageForm(order, stage) {
        currentOrderDraft = order;
        const isNewOrder = !order || !order.order_no;
        const existing = !isNewOrder ? (order.stages || []).find((s) => s.stage_name === stage.key) : null;
        const stageData = existing ? (typeof existing.stage_data === "string" ? JSON.parse(existing.stage_data) : existing.stage_data) : {};
        const attachments = existing ? (typeof existing.attachments === "string" ? JSON.parse(existing.attachments) : existing.attachments || []) : [];

        let projectType = order && order.project_type ? order.project_type : null;

        stageModalTitle.textContent = stage.name + (isNewOrder ? "" : " - " + (order.order_no || ""));

        if (isNewOrder) {
          // 新建单据：项目类型选择
          stageFormContent.innerHTML = '<div class="form-grid">' +
            '<div class="form-group full-width"><label class="form-label required">项目类型</label><select class="form-select" data-key="project_type" required>' +
            '<option value="">请选择</option><option value="domestic">国内项目（基础信息 → 首件确认 → 二次抽检）</option><option value="overseas">海外项目（基础信息 → 原料验收 → 首件确认 → 二次抽检）</option></select></div>' +
            '</div>' + getBasicFormHTML({});
        } else {
          // 编辑现有阶段
          if (stage.key === "basic") stageFormContent.innerHTML = getBasicFormHTML(stageData);
          else if (stage.key === "material_inspection") stageFormContent.innerHTML = getMaterialInspectionFormHTML(stageData);
          else if (stage.key === "first_piece") stageFormContent.innerHTML = getFirstPieceFormHTML(stageData);
          else if (stage.key === "second_check") stageFormContent.innerHTML = getSecondCheckFormHTML(stageData);
        }

        window._stageFiles = {};

        // 初始化文件上传组件
        if (isNewOrder) {
          // seal_photo
          const sealArea = stageFormContent.querySelector('[data-upload-key="seal_photo"]');
          const sealList = stageFormContent.querySelector('[data-files-key="seal_photo"]');
          if (sealArea) {
            const container = document.createElement("div");
            sealArea.replaceWith(container);
            window._stageFiles.seal_photo = renderFileUploader(container, [], false);
          }
        } else {
          const uploadAreas = stageFormContent.querySelectorAll(".file-upload-area");
          uploadAreas.forEach((area) => {
            const key = area.dataset.uploadKey || "attachments";

            const container = document.createElement("div");

            window._stageFiles[fileKey] = renderFileUploader(container, Array.isArray(existing) ? existing : [], false);
          });

        openModal(stageModal);
      }

      // ====== 提交阶段 ======
      async function submitStage(action) {
        const isNew = !currentOrderDraft || !currentOrderDraft.order_no;
        const stageName = isNew ? "basic" : currentOrderDraft.current_stage;
        const stage = STAGES[stageName];
        const data = collectFormData();
        const isValid = action === "save_draft" ? true : validateFormData(data, stage.key);
        if (!isValid) return;

        if (isNew) {
          // 创建新单据
          if (!data.project_type) { showToast("请选择项目类型", "error"); return; }
          if (!validateFormData(data, "basic")) return;
          const orderNo = generateOrderNo();
          const now = Date.now();
          const order = {
            id: generateId(),
            order_no: orderNo,
            project_type: data.project_type,
            current_stage: "basic",
            stages_completed: "",
            overall_status: "in_progress",
            factory_name: data.factory_name,
            project_name: data.project_name,
            material_name: data.material_name,
            material_params: data.material_params,
            surface_effect: data.surface_effect,
            batch: data.batch,
            quantity: data.quantity,
            production_start_time: data.production_start_time,
            seal_photo_url: (data.seal_photo && data.seal_photo[0]) ? data.seal_photo[0].url : "",
            remarks: data.remarks || "",
            submitted_by: currentUser.username,
            submitted_at: now,
            updated_at: now,
            created_at: now
          };
          const firstStage = {
            id: generateId(),
            order_no: orderNo,
            stage_name: "basic",
            stage_order: 1,
            stage_data: data,
            attachments: data.seal_photo || [],
            approval_status: action === "save_draft" ? "draft" : "pending",
            submitted_by: currentUser.username,
            submitted_at: now,
            created_at: now
          };
          const ok = await createOrderInCloud(order, firstStage);
          if (!ok) return;
          if (action !== "save_draft") {
            await saveApprovalLog(orderNo, "basic", "submit", currentUser.username, "提交基础信息", null, null);
          }
          showToast(action === "save_draft" ? "已暂存" : "已提交审批", "success");
          closeModal(stageModal);
          await renderOrders();
        } else {
          // 编辑现有阶段
          const orderNo = currentOrderDraft.order_no;
          const stageName = currentOrderDraft.current_stage;
          let existing = (currentOrderDraft.stages || []).find((s) => s.stage_name === stageName);
          if (!existing) {
            // 兜底：阶段记录不存在则自动创建一条
            const stageDef = STAGES[stageName];
            existing = {
              id: generateId(),
              order_no: orderNo,
              stage_name: stageName,
              stage_order: stageDef ? stageDef.order : 1,
              stage_data: {},
              attachments: [],
              approval_status: "draft",
              submitted_by: currentUser.username,
              submitted_at: null,
              created_at: Date.now()
            };
            await saveStageInCloud(existing);
          }
          const stageRecord = {
            id: existing.id,
            order_no: orderNo,
            stage_name: stageName,
            stage_order: existing.stage_order,
            stage_data: data,
            attachments: data.attachments || data.front_files || (stageName === "basic" ? data.seal_photo : data.attachments) || [],
            approval_status: action === "save_draft" ? "draft" : "pending",
            submitted_by: existing.submitted_by || currentUser.username,
            submitted_at: action === "save_draft" ? existing.submitted_at : Date.now(),
            reviewed_by: null,
            reviewed_at: null,
            review_comment: "",
            created_at: existing.created_at
          };
          const ok = await saveStageInCloud(stageRecord);
          if (!ok) return;
          if (action !== "save_draft") {
            await saveApprovalLog(orderNo, stageName, "submit", currentUser.username, "提交" + STAGES[stageName].name, null, null);
          }
          showToast(action === "save_draft" ? "已暂存" : "已提交审批", "success");
          closeModal(stageModal);
          await renderOrders();
        }
      }

      // ====== 渲染单据列表 ======
      async function renderOrders() {
        const orders = await loadOrdersFromCloud();
        // 角色过滤：操作员只看自己的单据
        let myOrders = orders;
        if (isUploader()) {
          myOrders = orders.filter((o) => o.submitted_by === currentUser.username);
        }

        // 在"我的单据"基础上应用筛选条件
        let filtered = myOrders;
        if (filters.keyword) {
          const kw = filters.keyword.toLowerCase();
          filtered = filtered.filter((o) =>
            (o.order_no || "").toLowerCase().includes(kw) ||
            (o.factory_name || "").toLowerCase().includes(kw) ||
            (o.project_name || "").toLowerCase().includes(kw) ||
            (o.material_name || "").toLowerCase().includes(kw)
          );
        }
        if (filters.projectType) {
          filtered = filtered.filter((o) => o.project_type === filters.projectType);
        }
        if (filters.overallStatus) {
          filtered = filtered.filter((o) => o.overall_status === filters.overallStatus);
        }

        // 统计数据基于"我的单据"（隔离），列表显示筛选后结果
        renderStats(myOrders);
        renderOrdersList(filtered);
        updatePendingBadge(myOrders);
      }

      function renderStats(myOrders) {
        // 只统计当前用户能看到的单据（操作员只看自己的，管理员看全部）
        document.getElementById("stat-total").textContent = myOrders.length;
        document.getElementById("stat-progress").textContent = myOrders.filter((o) => o.overall_status === "in_progress").length;
        document.getElementById("stat-completed").textContent = myOrders.filter((o) => o.overall_status === "completed").length;
        const pendingCount = myOrders.reduce((sum, o) => {
          if (o.overall_status === "completed" || o.current_stage === "completed") return sum;
          return sum + (o.stages || []).filter((s) => s.approval_status === "pending").length;
        }, 0);
        document.getElementById("stat-pending").textContent = pendingCount;
      }

      function updatePendingBadge(allOrders) {
        if (!isReviewer()) { pendingBadge.classList.add("hidden"); return; }
        const count = allOrders.reduce((sum, o) => {
          if (o.overall_status === "completed" || o.current_stage === "completed") return sum;
          return sum + (o.stages || []).filter((s) => s.approval_status === "pending").length;
        }, 0);
        if (count > 0) {
          pendingBadge.classList.remove("hidden");
          pendingCountEl.textContent = count > 99 ? "99+" : count;
        } else { pendingBadge.classList.add("hidden"); }
      }

      function renderOrdersList(orders) {
        ordersList.innerHTML = "";
        if (orders.length === 0) {
          ordersList.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div>暂无单据</div></div>';
          return;
        }
        orders.forEach((order) => {
          const stages = getStagesForProject(order.project_type);
          const card = document.createElement("div");
          card.className = "order-card status-" + order.overall_status;

          let progressHtml = '<div class="stage-progress">';
          stages.forEach((s, i) => {
            const stageData = (order.stages || []).find((st) => st.stage_name === s.key);
            const status = stageData ? stageData.approval_status : "pending";
            let cls = "stage-dot";
            if (status === "approved") cls += " completed";
            else if (s.key === order.current_stage && status === "pending") cls += " current";
            progressHtml += '<span class="' + cls + '">' + s.name + '</span>';
            if (i < stages.length - 1) progressHtml += '<span class="stage-arrow">→</span>';
          });
          progressHtml += '</div>';

          const overallStatus = OVERALL_STATUS_LABEL[order.overall_status] || order.overall_status;
          const projectType = PROJECT_TYPE_LABEL[order.project_type] || order.project_type;

          // 当前阶段提示
          const currentStage = (order.stages || []).find((s) => s.stage_name === order.current_stage);
          const currentStageStatus = currentStage ? currentStage.approval_status : "pending";
          let nextActionText = "";
          if (isUploader() && order.submitted_by === currentUser.username) {
            if (order.overall_status === "completed") {
              nextActionText = "✅ 已完成";
            } else if (currentStageStatus === "rejected") {
              nextActionText = "⚠️ 当前阶段被驳回，请修改重新提交";
            } else if (currentStageStatus === "draft") {
              nextActionText = "📝 草稿待完善";
            } else if (currentStageStatus === "pending") {
              nextActionText = "⏳ 当前阶段待审批";
            } else if (currentStageStatus === "approved") {
              const next = getNextStage(order.current_stage, order.project_type);
              if (next) nextActionText = "➡️ 可继续登记" + next.name;
              else nextActionText = "✅ 已完成";
            }
          } else if (isReviewer()) {
            if (order.overall_status === "completed" || order.current_stage === "completed") {
              nextActionText = "✅ 已完成";
            } else if (currentStageStatus === "pending") {
              nextActionText = "📋 待您审批";
            } else if (currentStageStatus === "rejected") {
              nextActionText = "⚠️ 当前阶段被驳回";
            } else if (currentStageStatus === "approved") {
              nextActionText = "⏳ 等待操作员登记下一阶段";
            } else {
              nextActionText = overallStatus;
            }
          }

          const actions = [];
          if (isUploader() && order.submitted_by === currentUser.username) {
            if (order.overall_status !== "completed") {
              const curStage = STAGES[order.current_stage];
              if (curStage && (currentStageStatus === "draft" || currentStageStatus === "rejected")) {
                actions.push('<button type="button" class="btn btn-primary btn-sm btn-continue" data-no="' + order.order_no + '" data-stage="' + order.current_stage + '">继续登记</button>');
              }
            }
            if (order.overall_status === "completed") {
              actions.push('<button type="button" class="btn btn-success btn-sm btn-qr" data-no="' + order.order_no + '">生成二维码</button>');
            }
          }
          if (isReviewer() && currentStageStatus === "pending" && order.overall_status !== "completed") {
            actions.push('<button type="button" class="btn btn-primary btn-sm btn-approve" data-no="' + order.order_no + '">审批</button>');
          }
          actions.push('<button type="button" class="btn btn-secondary btn-sm btn-view" data-no="' + order.order_no + '">查看</button>');
          actions.push('<button type="button" class="btn btn-secondary btn-sm btn-history" data-no="' + order.order_no + '">历史</button>');
          // 删除：操作员自己的非完成单据，或管理员（任意单据）
          if ((isUploader() && order.submitted_by === currentUser.username && order.overall_status !== "completed") || isReviewer()) {

        return arr.map((f) => {

          if (isImg) return '<a href="' + escapeHtml(f.url) + '" target="_blank"><img src="' + escapeHtml(f.url) + '" class="view-img-preview" /></a>';
          return '<a class="view-file-link" href="' + escapeHtml(f.url) + '" target="_blank">📄 ' + escapeHtml(f.name) + '</a>';
        }).join(" ");
      }

      async function handleApproval(action) {
        if (!pendingApprovalStage) return;
        const { order, stage } = pendingApprovalStage;
        const comment = approvalComment.value.trim();
        if (action === "reject" && !comment) {
          showToast("驳回必须填写意见", "error");
          return;
        }
        const now = Date.now();
        const newStatus = action === "pass" ? "approved" : "rejected";
        const updates = {
          approval_status: newStatus,
          reviewed_by: currentUser.username,
          reviewed_at: now,
          review_comment: comment
        };
        const ok = await saveStageInCloud({ ...stage, ...updates });
        if (!ok) return;
        await saveApprovalLog(order.order_no, stage.stage_name, action === "pass" ? "approve" : "reject", currentUser.username, comment, null, null);

        if (action === "pass") {
          // 推进到下一阶段
          const next = getNextStage(stage.stage_name, order.project_type);
          if (next) {
            // 主动创建下一阶段的空记录，避免操作员提交时找不到
            const nextStageExists = (order.stages || []).find((s) => s.stage_name === next.key);
            if (!nextStageExists) {
              await saveStageInCloud({
                id: generateId(),
                order_no: order.order_no,
                stage_name: next.key,
                stage_order: next.order,
                stage_data: {},
                attachments: [],
                approval_status: "draft",
                submitted_by: currentUser.username,
                submitted_at: null,
                created_at: Date.now()
              });
            }
            await updateOrderInCloud(order.order_no, {
              current_stage: next.key,
              stages_completed: (order.stages_completed || "") + stage.stage_name + ","
            });
          } else {
            // 全部完成
            await updateOrderInCloud(order.order_no, {
              current_stage: "completed",
              stages_completed: (order.stages_completed || "") + stage.stage_name + ",",
              overall_status: "completed"
            });
          }
          showToast("已通过审批" + (next ? "，可继续登记" + next.name : "，单据已完成"), "success");
        } else {
          await updateOrderInCloud(order.order_no, { overall_status: "rejected" });
          showToast("已驳回", "success");
        }
        closeModal(approvalModal);
        await renderOrders();
      }

            return '<div style="padding:12px;border-bottom:1px solid #e5e7eb;">' +
              '<div style="display:flex;justify-content:space-between;font-weight:600;"><span>' + escapeHtml(actionLabel) + ' - ' + escapeHtml(STAGES[h.stage_name] ? STAGES[h.stage_name].name : h.stage_name) + '</span><span style="color:#6b7280;font-size:13px;">' + formatDate(h.created_at) + '</span></div>' +

      // ====== 二维码 ======
      function showQRCode(orderNo) {
        qrDisplay.innerHTML = "";
        qrInfo.innerHTML = "";
        const url = PUBLIC_VIEW_URL + "?order=" + encodeURIComponent(orderNo);
        qrInfo.innerHTML = '单据号：<strong>' + escapeHtml(orderNo) + '</strong><br>扫描二维码查看完整单据信息';
        new QRCode(qrDisplay, {
          text: url,
          width: 240,
          height: 240,
          colorDark: "#003894",
          colorLight: "#ffffff"
        });
        btnDownloadQr.dataset.url = url;

      function downloadQR() {
        const canvas = qrDisplay.querySelector("canvas");
        if (!canvas) return;
        const url = canvas.toDataURL("image/png");
        const a = document.createElement("a");
        a.href = url;
        a.download = "qrcode_" + (btnDownloadQr.dataset.url || "code") + ".png";
        a.click();
      }

      // ====== 事件绑定 ======
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        loginError.textContent = "登录中...";
        const username = loginUsername.value.trim();
        const password = loginPassword.value;
        if (!supabaseClient) {
          const ready = await initSupabase();
          if (!ready) { loginError.textContent = "云服务连接失败"; return; }
        }
        const result = await login(username, password);
        if (result.success) {
          loginError.textContent = "";
          showMainApp();
          applyRoleUI();
          await renderOrders();
          const displayName = result.role === ROLE.UPLOADER ? "操作员" : "管理员";
          showToast("欢迎，" + (result.displayName || displayName), "success");
        } else {
          loginError.textContent = result.message;
          loginPassword.value = "";
          loginPassword.focus();
        }
      });

      btnDownloadQr.addEventListener("click", downloadQR);
      document.getElementById("btn-manage-users").addEventListener("click", openUsersModal);
      document.getElementById("btn-users-close").addEventListener("click", () => closeModal(document.getElementById("users-modal")));
      document.getElementById("btn-add-user").addEventListener("click", () => openUserEditModal(null));
      document.getElementById("btn-user-edit-cancel").addEventListener("click", () => closeModal(document.getElementById("user-edit-modal")));
      document.getElementById("btn-user-edit-save").addEventListener("click", saveUser);

      // ====== 账户管理（仅管理员） ======
      async function loadUsers() {
        try {
          const { data, error } = await supabaseClient.from(SUPABASE_USERS_TABLE)
            .select("*").order("created_at", { ascending: false });
          if (error) throw error;
          return data || [];
        } catch (e) { console.error(e); return []; }
      }

      async function renderUsersList() {
        const users = await loadUsers();
        const container = document.getElementById("users-list");
        if (users.length === 0) {
          container.innerHTML = '<div style="text-align:center;padding:20px;color:#6b7280;">暂无账户</div>';
          return;
        }
        container.innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:14px;">' +
          '<thead><tr style="background:#f3f4f6;"><th style="padding:8px;text-align:left;">用户名</th><th style="padding:8px;text-align:left;">显示名</th><th style="padding:8px;text-align:left;">角色</th><th style="padding:8px;text-align:left;">状态</th><th style="padding:8px;text-align:left;">最后登录</th><th style="padding:8px;text-align:right;">操作</th></tr></thead><tbody>' +
          users.map((u) => {
            const isAdmin = u.role === ROLE.REVIEWER;
            const status = u.is_active ? '<span style="color:#10b981;">启用</span>' : '<span style="color:#ef4444;">停用</span>';
            const lastLogin = u.last_login_at ? formatDate(u.last_login_at) : "-";
            return '<tr style="border-bottom:1px solid #e5e7eb;">' +
              '<td style="padding:8px;"><strong>' + escapeHtml(u.username) + '</strong></td>' +
              '<td style="padding:8px;">' + escapeHtml(u.display_name || "-") + '</td>' +
              '<td style="padding:8px;">' + (isAdmin ? "管理员" : "操作员") + '</td>' +
              '<td style="padding:8px;">' + status + '</td>' +
              '<td style="padding:8px;">' + lastLogin + '</td>' +
              '<td style="padding:8px;text-align:right;">' +
                '<button type="button" class="btn btn-secondary btn-sm btn-edit-user" data-id="' + u.id + '">重置密码</button> ' +
                '<button type="button" class="btn btn-warning btn-sm btn-toggle-user" data-id="' + u.id + '" data-active="' + u.is_active + '">' + (u.is_active ? "停用" : "启用") + '</button>' +
              '</td></tr>';
          }).join("") +
          '</tbody></table>';
        bindUserActions();
      }

      function bindUserActions() {
        document.querySelectorAll(".btn-edit-user").forEach((btn) => btn.addEventListener("click", () => openUserEditModal(btn.dataset.id)));
        document.querySelectorAll(".btn-toggle-user").forEach((btn) => btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const active = btn.dataset.active === "true";
          if (!confirm("确定要" + (active ? "停用" : "启用") + "该账户？")) return;
          const { error } = await supabaseClient.from(SUPABASE_USERS_TABLE).update({ is_active: !active }).eq("id", id);
          if (error) { showToast("操作失败", "error"); return; }
          showToast("已" + (active ? "停用" : "启用"), "success");
          await renderUsersList();
        }));
      }

      function openUsersModal() {
        renderUsersList();
        openModal(document.getElementById("users-modal"));
      }

      async function openUserEditModal(userId) {
        document.getElementById("user-edit-error").textContent = "";
        document.getElementById("user-edit-username").value = "";
        document.getElementById("user-edit-displayname").value = "";
        document.getElementById("user-edit-password").value = "";
        document.getElementById("user-edit-username").disabled = false;
        document.getElementById("user-edit-title").textContent = "新增操作员";
        if (userId) {
          document.getElementById("user-edit-title").textContent = "重置密码";
          document.getElementById("user-edit-username").disabled = true;
          const users = await loadUsers();
          const u = users.find((x) => x.id === userId);
          if (u) {
            document.getElementById("user-edit-username").value = u.username;
            document.getElementById("user-edit-displayname").value = u.display_name || "";
          }
        }
        document.getElementById("user-edit-modal").dataset.userId = userId || "";
        openModal(document.getElementById("user-edit-modal"));
      }

      async function saveUser() {
        const userId = document.getElementById("user-edit-modal").dataset.userId;
        const username = document.getElementById("user-edit-username").value.trim();
        const displayName = document.getElementById("user-edit-displayname").value.trim();
        const password = document.getElementById("user-edit-password").value;
        const errEl = document.getElementById("user-edit-error");
        errEl.textContent = "";

        if (!userId && (!username || !password)) {
          errEl.textContent = "请填写用户名和密码";
          return;
        }
        if (password && password.length < 4) {
          errEl.textContent = "密码至少 4 位";
          return;
        }
        if (!userId && !/^[a-zA-Z0-9_]+$/.test(username)) {
          errEl.textContent = "用户名只能是字母数字下划线";
          return;
        }

        try {
          if (userId) {
            // 重置密码
            const updates = {};
            if (password) updates.password_hash = await hashPassword(password);
            if (displayName) updates.display_name = displayName;
            const { error } = await supabaseClient.from(SUPABASE_USERS_TABLE).update(updates).eq("id", userId);
            if (error) throw error;
            showToast("已更新", "success");
          } else {
            const hash = await hashPassword(password);
            const { error } = await supabaseClient.from(SUPABASE_USERS_TABLE).insert([{
              id: generateId(),
              username,
              password_hash: hash,
              display_name: displayName || username,
              role: ROLE.UPLOADER,
              is_active: true,
              created_at: Date.now(),
              created_by: currentUser.username
            }]);
            if (error) throw error;
            showToast("操作员创建成功", "success");
          }
          closeModal(document.getElementById("user-edit-modal"));
          await renderUsersList();
        } catch (e) {
          if (e.message && e.message.includes("duplicate")) {
            errEl.textContent = "用户名已存在";
          } else {
            errEl.textContent = "保存失败：" + (e.message || e);
          }
        }
      }
      btnCancelDelete.addEventListener("click", () => closeModal(confirmModal));
      btnConfirmDelete.addEventListener("click", async () => {
        if (pendingDeleteOrderNo) {
          await deleteOrderInCloud(pendingDeleteOrderNo);
          showToast("已删除", "success");
          await renderOrders();
        }
        closeModal(confirmModal);
        pendingDeleteOrderNo = null;
      });

      searchInput.addEventListener("input", debounce(() => { filters.keyword = searchInput.value; renderOrders(); }, 250));
      filterProjectType.addEventListener("change", () => { filters.projectType = filterProjectType.value; renderOrders(); });
      filterOverallStatus.addEventListener("change", () => { filters.overallStatus = filterOverallStatus.value; renderOrders(); });

      btnPendingList.addEventListener("click", () => {
        filters.overallStatus = "in_progress";
        filterOverallStatus.value = "in_progress";
        renderOrders();
        document.getElementById("orders-list").scrollIntoView({ behavior: "smooth" });
      });
      statCardPending.addEventListener("click", () => btnPendingList.click());

      function debounce(fn, ms) {
        let t = null;
        return function (...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), ms); };
      }

      // ====== 初始化 ======
      async function init() {
        const ready = await initSupabase();
        if (!ready) { showLoginScreen(); return; }
        await ensureSystemAdmin();
        const user = getCurrentUser();
        if (user && user.userId) {
          currentUser = user;
          showMainApp();
          applyRoleUI();
          await renderOrders();
        } else {
          showLoginScreen();
        }
      }
      init();
    })();
  </script>
</body>
</html>
